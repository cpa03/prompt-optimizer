services:
  prompt-optimizer:
    # 开发模式：从源码构建
    build:
      context: .
      dockerfile: Dockerfile
    image: linshen/prompt-optimizer:dev
    container_name: prompt-optimizer-dev
    restart: unless-stopped
    ports:
      - '28082:${NGINX_PORT:-80}' # Web应用端口（包含MCP服务器，通过/mcp路径访问）
    extra_hosts:
      - 'host.docker.internal:host-gateway' # 允许容器访问宿主机
    env_file:
      - .env.local # 读取本地环境变量文件
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'curl -f http://localhost:${NGINX_PORT:-80}/ && curl -f http://localhost:${NGINX_PORT:-80}/mcp',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 'org.opencontainers.image.title=Prompt Optimizer (Dev)'
      - 'org.opencontainers.image.description=AI prompt optimization tool - Development'
      - 'org.opencontainers.image.source=https://github.com/linshenkx/prompt-optimizer'
      - 'org.opencontainers.image.vendor=Prompt Optimizer Team'
    environment:
      # nginx内部端口配置
      - NGINX_PORT=${NGINX_PORT:-80}

      # Web应用API配置（从 .env.local 读取，不在此处覆盖）

      # MCP服务器配置（Docker内部固定端口3000，忽略MCP_HTTP_PORT环境变量）
      # - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-debug}
      # - MCP_DEFAULT_LANGUAGE=${MCP_DEFAULT_LANGUAGE:-zh}
      # - MCP_DEFAULT_MODEL_PROVIDER=${MCP_DEFAULT_MODEL_PROVIDER:-openai}

      # Basic认证配置（可选）
      - ACCESS_USERNAME=${ACCESS_USERNAME:-admin}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-123456}
    # DevOps: Resource limits for development (more relaxed than production)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # DevOps: Logging configuration with rotation
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
        labels: 'service,environment'
        tag: '{{.Name}}'
    # DevOps: Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # DevOps: Network isolation
    networks:
      - prompt-optimizer-dev-network
    # DevOps: Graceful shutdown
    stop_grace_period: 30s

networks:
  prompt-optimizer-dev-network:
    driver: bridge
