# Cloudflare Workers/Pages Configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "prompt-optimizer"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = "packages/web/dist"

# Enable enhanced Cloudflare features
[placement]
mode = "smart"

# Observability (Cloudflare best practice)
[observability]
enabled = true
head_sampling_rate = 0.1

# Logs configuration for better debugging
[logs]
level = "info"

# Development configuration
[dev]
port = 8788
local_protocol = "http"
ip = "localhost"

# TypeScript rules for functions directory
# Allows wrangler to properly handle .ts files in functions/
[[rules]]
type = "ESModule"
globs = ["functions/**/*.ts"]

# Performance optimization: Enable HTTP/3
# https://developers.cloudflare.com/network/http3/
# Note: This is configured at the Cloudflare dashboard level for Pages projects

# Asset caching rules are configured via _headers file in packages/web/public/
# This follows Cloudflare best practices for Pages projects

# Environment variables (set via Cloudflare dashboard or wrangler secret)
# [vars]
# ACCESS_PASSWORD = ""

# Production environment (optional override)
# [env.production]
# name = "prompt-optimizer-prod"
# routes = [
#   { pattern = "prompt-optimizer.example.com/*", custom_domain = true }
# ]

# KV namespace for distributed rate limiting (recommended for production)
# Without KV, rate limiting is per-isolate and won't work across edge locations
# To enable: 
# 1. Create KV namespace: wrangler kv:namespace create SESSIONS
# 2. Uncomment below and add the returned namespace ID
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "your-kv-namespace-id"

# D1 database for persistent storage (optional)
# [[d1_databases]]
# binding = "DB"
# database_name = "prompt-optimizer-db"
# database_id = "your-d1-database-id"
